name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev extras only; core needs no infra to test)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check concord tests benchmark

      - name: Test with coverage
        run: pytest --cov=concord --cov-report=term-missing --cov-fail-under=85

      - name: Smoke-test the demo (no external services)
        run: concord demo --count 200 --fail-rate 0.2 --log-level ERROR
