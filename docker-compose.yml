services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: concord
      POSTGRES_DB: concord
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concord"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redpanda speaks the Kafka protocol but needs no ZooKeeper/KRaft ceremony,
  # which makes local dev start in seconds instead of a minute. See ADR 0002.
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  relay:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      CONCORD_DATABASE_URL: postgresql://concord:concord@postgres:5432/concord
      CONCORD_KAFKA_BOOTSTRAP: redpanda:9092
      CONCORD_REDIS_URL: redis://redis:6379/0
      CONCORD_MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CONCORD_LOG_LEVEL: INFO
    command: ["concord", "relay"]
